name: Quick Tunnel (No Domain)

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Start browserless-node
        run: |
          docker run -d --restart=unless-stopped --name browserless -p 3000:3000 browserless/chrome
          sleep 5

      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start quick tunnel and display URL
        run: |
          # Start tunnel
          cloudflared tunnel --url http://localhost:3000 2>&1 | tee tunnel.log &
          TUNNEL_PID=$!
          
          # Wait for tunnel to establish
          sleep 10
          
          # Extract URL from logs
          URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' tunnel.log | head -1)
          
          # Save URL for later steps
          echo "TUNNEL_URL=$URL" >> $GITHUB_ENV
          
          echo "========================================="
          echo "✅ BROWSER ACTIVE"
          echo "========================================="
          echo "🔗 BROWSER_URL: $URL"
          echo "========================================="
          echo ""
          echo "⏰ Browser running for 6 hours"
          echo ""

          sleep 21000

      - name: Cleanup
        if: always()
        run: |
          docker stop browserless || true
          pkill cloudflared || true
