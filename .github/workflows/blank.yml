name: Quick Tunnel (No Domain)

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Start browserless-node
        run: |
          docker run -d \
          --name mini-browser \
          -p 3000:3000 \
          -e PUID=1000 \
          -e PGID=1000 \
          -e TZ=Etc/UTC \
          -e CHROME_CLI=https://google.com/ \
          --shm-size="1gb" \
          --restart unless-stopped \
          lscr.io/linuxserver/chromium:latest
          sleep 5

      - name: Install ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null \
            && echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list \
            && sudo apt update \
            && sudo apt install ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Start ngrok and capture URL
        id: expose
        run: |
          ngrok http 3000 --log=stdout > ngrok.log &
          sleep 5
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys,json;print(json.load(sys.stdin)['tunnels'][0]['public_url'])")
          echo "TUNNEL_URL=$URL" >> $GITHUB_OUTPUT
          sleep 21000

      - name: Cleanup
        if: always()
        run: |
          docker stop mini-browser || true
          pkill cloudflared || true
